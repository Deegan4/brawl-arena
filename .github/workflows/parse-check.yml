name: parse-check

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  parse-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check index.html script block
        run: node scripts/parse-check.mjs
